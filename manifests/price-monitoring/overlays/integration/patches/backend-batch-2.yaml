apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-batch-2-deployment
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: backend-batch-2
          command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq/general_process.yml", "-e", "integration"]
          resources:
            limits:
              cpu: "300m"
              memory: "300Mi"
          env:
            - name: ALLOWED_ORIGINS
              value: "10.15.100.221"
            - name: DD_SERVICE
              value: "price-monitoring-integration"
            - name: DD_ENV
              value: "integration"
