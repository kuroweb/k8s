apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-batch-3-deployment
spec:
  template:
    spec:
      containers:
        - name: backend-batch-3
          command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq/crawl_process_2.yml", "-e", "production"]
          resources:
            limits:
              cpu: "500m"
          env:
            - name: ALLOWED_ORIGINS
              value: "10.15.100.211"
            - name: DD_SERVICE
              value: "price-monitoring"
            - name: DD_ENV
              value: "production"
