apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  loadBalancerIP: 10.15.100.210
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  template:
    spec:
      containers:
        - name: backend
          command: ["./bin/rails", "server", "-b", "0.0.0.0", "-p", "3000", "-e", "production"]
          env:
            - name: ALLOWED_ORIGINS
              value: "10.15.100.210,price-monitoring.kuroweb.net,backend-service"
            - name: DD_SERVICE
              value: "price-monitoring"
            - name: DD_ENV
              value: "production"
