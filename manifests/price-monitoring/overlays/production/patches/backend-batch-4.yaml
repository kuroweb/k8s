apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-batch-4-deployment
spec:
  template:
    spec:
      containers:
        - name: backend-batch-4
          command: ["sidekiq", "-C", "config/sidekiq/crawl_process_3.yml", "-e", "production"]
          env:
            - name: ALLOWED_ORIGINS
              value: "10.15.100.211"
            - name: DD_SERVICE
              value: "price-monitoring"
            - name: DD_ENV
              value: "production"
