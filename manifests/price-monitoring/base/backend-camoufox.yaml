apiVersion: v1
kind: Service
metadata:
  name: backend-camoufox-service
spec:
  selector:
    app: price-monitoring
    server: backend-camoufox
  type: LoadBalancer
  ports:
    - name: http
      protocol: TCP
      port: 8890
      targetPort: 8890

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-camoufox-deployment
  labels:
    app: price-monitoring
spec:
  selector:
    matchLabels:
      app: price-monitoring
      server: backend-camoufox
  template:
    metadata:
      labels:
        app: price-monitoring
        server: backend-camoufox
    spec:
      containers:
        - name: backend-camoufox
          image: docker-registry.kuroweb.net/price-monitoring-backend-camoufox:placeholder
          ports:
            - name: http
              containerPort: 8890
          resources:
            limits:
              cpu: "500m"
              memory: "700Mi"
